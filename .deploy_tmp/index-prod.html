<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>益寿巴渝APP - 原型预览</title>
  <style>
    html, body, #root { min-height: 100%; margin: 0; padding: 0; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./node_modules/react/umd/react.production.min.js"></script>
  <script src="./node_modules/react-dom/umd/react-dom.production.min.js"></script>
  <script>
    // 定义 __AXHUB_DEFINE_COMPONENT__ 来接收构建产物的组件并自动挂载
    window.__AXHUB_DEFINE_COMPONENT__ = function(Comp) {
      ReactDOM.render(React.createElement(Comp), document.getElementById('root'));
    };
    // 兜底：如果构建产物没有调用 __AXHUB_DEFINE_COMPONENT__，尝试从 window 上读取
    window.__AXHUB_FALLBACK__ = function() {
      if (!document.getElementById('root').hasChildNodes() || document.getElementById('root').childElementCount === 0) {
        document.getElementById('root').innerText = '加载失败：组件未正确注册。';
      }
    };
  </script>
  <script src="./dist/prototypes/yishou-app.js"></script>
  <script>
    window.__AXHUB_FALLBACK__ && window.__AXHUB_FALLBACK__();
  </script>
</body>
</html>
